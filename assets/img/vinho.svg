<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Uma videira em primeiro plano com cachos de uvas, ao entardecer na planície alentejana">
  <defs>
    <linearGradient id="v-ceu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#431923"/>
      <stop offset=".34" stop-color="#6E3340"/>
      <stop offset=".62" stop-color="#A55F67"/>
      <stop offset=".84" stop-color="#D29A8E"/>
      <stop offset="1"   stop-color="#EBD9BE"/>
    </linearGradient>
    <radialGradient id="v-glow" cx=".5" cy=".5" r=".5">
      <stop offset="0"   stop-color="#F7EEDC" stop-opacity=".8"/>
      <stop offset=".45" stop-color="#F0C9A6" stop-opacity=".3"/>
      <stop offset="1"   stop-color="#F0C9A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="v-chao" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#B89C6E"/>
      <stop offset="1"   stop-color="#463A2B"/>
    </linearGradient>

    <!-- Um cacho de uvas, reutilizado -->
    <g id="cacho">
      <g fill="#571E29">
        <circle cx="-33" cy="0"  r="13"/><circle cx="-11" cy="0" r="13"/><circle cx="11" cy="0" r="13"/><circle cx="33" cy="0" r="13"/>
        <circle cx="-22" cy="21" r="13"/><circle cx="0" cy="21" r="13"/><circle cx="22" cy="21" r="13"/>
        <circle cx="-13" cy="42" r="13"/><circle cx="11" cy="42" r="13"/>
        <circle cx="-1" cy="62" r="13"/>
      </g>
      <g fill="#3B131C">
        <circle cx="33" cy="0" r="13"/><circle cx="0" cy="21" r="13"/><circle cx="-13" cy="42" r="13"/>
      </g>
      <g fill="#B07A82" opacity=".55">
        <circle cx="-30" cy="-4" r="4"/><circle cx="8" cy="-4" r="4"/><circle cx="-19" cy="17" r="4"/><circle cx="14" cy="38" r="4"/>
      </g>
    </g>

    <!-- Uma folha de videira, reutilizada -->
    <g id="folha" fill="#33503F">
      <path d="M0 0 C -26 -14 -34 -44 -14 -58 C -6 -50 -4 -50 0 -56 C 4 -50 6 -50 14 -58 C 34 -44 26 -14 0 0 Z"/>
      <path d="M0 -4 L0 -48 M0 -22 L-14 -34 M0 -22 L14 -34" stroke="#213528" stroke-width="1.5" fill="none" opacity=".6"/>
    </g>
  </defs>

  <!-- Céu -->
  <rect width="1600" height="560" fill="url(#v-ceu)"/>
  <circle cx="1200" cy="200" r="220" fill="url(#v-glow)"/>
  <circle cx="1200" cy="202" r="42" fill="#F9F1E0" opacity=".95"/>

  <!-- Serras -->
  <path d="M0 560 L200 536 L400 556 L620 530 L840 554 L1060 532 L1300 554 L1520 536 L1600 548 L1600 560 Z"
        fill="#5E2733" opacity=".32"/>

  <!-- Planície + renques ao fundo -->
  <rect y="560" width="1600" height="340" fill="url(#v-chao)"/>
  <g stroke="#4C4130" stroke-linecap="round" opacity=".3">
    <path d="M1150 562 L560 740" stroke-width="4"/>
    <path d="M1150 562 L860 740" stroke-width="3"/>
    <path d="M1150 562 L1120 740" stroke-width="3"/>
    <path d="M1150 562 L1440 740" stroke-width="3"/>
    <path d="M1150 562 L1760 740" stroke-width="4"/>
  </g>

  <!-- Videira: estaca, arame e cordão no terço superior -->
  <rect x="336" y="150" width="15" height="410" fill="#3A2C1E"/>
  <line x1="0" y1="322" x2="1600" y2="322" stroke="#6E5A3C" stroke-width="2.5" opacity=".75"/>
  <path d="M120 340 Q343 300 620 326 T1150 322 T1600 330" fill="none" stroke="#4A3826" stroke-width="10" stroke-linecap="round"/>

  <!-- Folhas ao longo do cordão -->
  <use href="#folha" transform="translate(250 322) rotate(-16) scale(1.5)"/>
  <use href="#folha" transform="translate(470 318) rotate(12) scale(1.7)"/>
  <use href="#folha" transform="translate(700 326) rotate(-8) scale(1.5)"/>
  <use href="#folha" transform="translate(930 320) rotate(16) scale(1.8)"/>
  <use href="#folha" transform="translate(1170 322) rotate(-12) scale(1.6)"/>
  <use href="#folha" transform="translate(1380 326) rotate(10) scale(1.7)"/>

  <!-- Cachos pendurados -->
  <use href="#cacho" transform="translate(360 340) scale(1.1)"/>
  <use href="#cacho" transform="translate(600 346) scale(1.25)"/>
  <use href="#cacho" transform="translate(880 340) scale(1.15)"/>
  <use href="#cacho" transform="translate(1120 348) scale(1.3)"/>
  <use href="#cacho" transform="translate(1420 342) scale(1.2)"/>

  <rect y="700" width="1600" height="200" fill="#241C15" opacity=".26"/>
</svg>
