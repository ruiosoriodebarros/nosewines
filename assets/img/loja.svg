<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Uma banca de feira com toldo listrado e mercadoria No Sé!, na planície alentejana">
  <defs>
    <linearGradient id="s-ceu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#5E2C3A"/>
      <stop offset=".40" stop-color="#93636D"/>
      <stop offset=".72" stop-color="#CFA48F"/>
      <stop offset="1"   stop-color="#EBD9BE"/>
    </linearGradient>
    <radialGradient id="s-glow" cx=".5" cy=".5" r=".5">
      <stop offset="0"   stop-color="#F9EFD9" stop-opacity=".7"/>
      <stop offset=".5"  stop-color="#E6C39C" stop-opacity=".22"/>
      <stop offset="1"   stop-color="#E6C39C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-chao" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#BB9E70"/>
      <stop offset="1"   stop-color="#4C4030"/>
    </linearGradient>
  </defs>

  <!-- Céu -->
  <rect width="1600" height="592" fill="url(#s-ceu)"/>
  <circle cx="1330" cy="196" r="200" fill="url(#s-glow)"/>
  <circle cx="1330" cy="198" r="38" fill="#FBF3E1" opacity=".86"/>

  <!-- Serras -->
  <path d="M0 592 L220 568 L420 588 L640 560 L860 586 L1080 562 L1320 586 L1520 566 L1600 578 L1600 592 Z"
        fill="#5E2733" opacity=".34"/>

  <!-- Planície -->
  <rect y="592" width="1600" height="308" fill="url(#s-chao)"/>
  <g stroke="#3E3527" fill="none" opacity=".14">
    <path d="M0 636 Q800 620 1600 642" stroke-width="2"/>
    <path d="M0 712 Q800 688 1600 720" stroke-width="3"/>
  </g>

  <!-- ====== BANCA DE FEIRA ====== -->
  <!-- Postes -->
  <rect x="470" y="238" width="15" height="362" fill="#2B2620"/>
  <rect x="1115" y="238" width="15" height="362" fill="#2B2620"/>

  <!-- Bancada (tampo + pano da frente) -->
  <rect x="500" y="398" width="600" height="20" rx="3" fill="#5A4632"/>
  <rect x="508" y="418" width="584" height="184" fill="#E4D8BC"/>
  <rect x="508" y="418" width="584" height="184" fill="#000" opacity=".05"/>
  <line x1="600" y1="418" x2="600" y2="600" stroke="#CBBE9E" stroke-width="2" opacity=".6"/>
  <line x1="800" y1="418" x2="800" y2="600" stroke="#CBBE9E" stroke-width="2" opacity=".6"/>
  <line x1="1000" y1="418" x2="1000" y2="600" stroke="#CBBE9E" stroke-width="2" opacity=".6"/>

  <!-- Toldo: painel de riscas verticais com barra ondulada -->
  <g>
    <rect x="452" y="204" width="69.6" height="52" fill="#571E29"/>
    <rect x="521.6" y="204" width="69.6" height="52" fill="#F4EDDC"/>
    <rect x="591.2" y="204" width="69.6" height="52" fill="#571E29"/>
    <rect x="660.8" y="204" width="69.6" height="52" fill="#F4EDDC"/>
    <rect x="730.4" y="204" width="69.6" height="52" fill="#571E29"/>
    <rect x="800" y="204" width="69.6" height="52" fill="#F4EDDC"/>
    <rect x="869.6" y="204" width="69.6" height="52" fill="#571E29"/>
    <rect x="939.2" y="204" width="69.6" height="52" fill="#F4EDDC"/>
    <rect x="1008.8" y="204" width="69.6" height="52" fill="#571E29"/>
    <rect x="1078.4" y="204" width="69.6" height="52" fill="#F4EDDC"/>

    <path d="M452 256 Q486.8 300 521.6 256 Z" fill="#571E29"/>
    <path d="M521.6 256 Q556.4 300 591.2 256 Z" fill="#F4EDDC"/>
    <path d="M591.2 256 Q626 300 660.8 256 Z" fill="#571E29"/>
    <path d="M660.8 256 Q695.6 300 730.4 256 Z" fill="#F4EDDC"/>
    <path d="M730.4 256 Q765.2 300 800 256 Z" fill="#571E29"/>
    <path d="M800 256 Q834.8 300 869.6 256 Z" fill="#F4EDDC"/>
    <path d="M869.6 256 Q904.4 300 939.2 256 Z" fill="#571E29"/>
    <path d="M939.2 256 Q974 300 1008.8 256 Z" fill="#F4EDDC"/>
    <path d="M1008.8 256 Q1043.6 300 1078.4 256 Z" fill="#571E29"/>
    <path d="M1078.4 256 Q1113.2 300 1148 256 Z" fill="#F4EDDC"/>

    <rect x="446" y="196" width="708" height="10" rx="4" fill="#3B131C"/>
  </g>

  <!-- Bandeirola no topo -->
  <line x1="800" y1="196" x2="800" y2="160" stroke="#2B2620" stroke-width="4"/>
  <path d="M800 162 L840 174 L800 186 Z" fill="#33503F"/>

  <!-- ====== MERCADORIA ====== -->
  <!-- Pilha de roupa dobrada -->
  <g>
    <rect x="556" y="376" width="150" height="22" rx="3" fill="#571E29"/>
    <rect x="562" y="356" width="138" height="22" rx="3" fill="#E8DEC9"/>
    <rect x="558" y="336" width="146" height="22" rx="3" fill="#33503F"/>
    <rect x="565" y="316" width="132" height="22" rx="3" fill="#F4EDDC"/>
    <line x1="631" y1="316" x2="631" y2="398" stroke="#000" stroke-width="1" opacity=".08"/>
  </g>

  <!-- Dois bonés dobrados -->
  <g transform="translate(792 398)">
    <path d="M-42 0 a42 30 0 0 1 84 0 Z" fill="#571E29"/>
    <path d="M42 0 q22 -2 30 8 q-16 8 -30 -2 Z" fill="#571E29"/>
    <path d="M-42 0 a42 30 0 0 1 84 0" fill="none" stroke="#3B131C" stroke-width="1.5" opacity=".5"/>
  </g>
  <g transform="translate(892 398)">
    <path d="M-40 0 a40 28 0 0 1 80 0 Z" fill="#33503F"/>
    <path d="M40 0 q20 -2 28 8 q-15 7 -28 -2 Z" fill="#33503F"/>
  </g>

  <!-- Tote encostada -->
  <g transform="translate(1010 398)">
    <path d="M-24 -70 Q-24 -104 0 -104 Q24 -104 24 -70" fill="none" stroke="#B7A17A" stroke-width="6"/>
    <rect x="-40" y="-72" width="80" height="72" rx="3" fill="#E4D8BC"/>
    <text x="0" y="-24" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="30" fill="#571E29">Sé!</text>
  </g>

  <rect y="640" width="1600" height="260" fill="#241C15" opacity=".2"/>
</svg>
